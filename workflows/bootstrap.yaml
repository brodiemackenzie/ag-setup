name: bootstrap
description: Initialize a new Spec-Driven Development project workspace cleanly sandboxed and bound to GitHub.
slash_command: /bootstrap
parameters:
  - name: project_name
    type: string
    description: The name of the project directory (created under ~/projects/ or as local path).
    required: false
  - name: github_url
    type: string
    description: The GitHub SSH repository remote URL to bind (e.g. git@github.com:user/repo.git).
    required: false
  - name: scaffold
    type: string
    description: Scaffolding boilerplate choice ('python', 'nextjs', or 'none').
    required: false

steps:
  - name: gather_parameters
    description: Conversationally ask the user for any missing parameters (project_name, github_url, scaffold) one at a time.
  - name: execute_bootstrap
    description: Run the local bootstrap script on behalf of the user using gathering inputs.
    command: |
      ~/projects/ag-setup/skills/project-bootstrap/scripts/bootstrap.sh "{{project_name}}" "{{github_url}}" --scaffold "{{scaffold}}"
